name: SecureSDLC SCA
run-name: "[SecureSDLC SCA] Ref:${{ github.ref_name }} Event:${{ github.event_name }}"

on:
  workflow_dispatch: {}
  workflow_call:
    secrets:
      SEMGREP_APP_URL:
        required: true
      SEMGREP_APP_TOKEN:
        required: true
      SDLC_SLACK_NOTIFICATIONS:
        required: true
  pull_request: {}
  # pull_request_target: {} # Gives workflows excessive permissions. Not wanted.
  push: # Used for local testing.
    branches:
      - '**'

jobs:
  securesdlc-visibility-check:
    name: Repo visibility check
    continue-on-error: true # For private repos withou GHAS publishing fails. Also we do not want to block devs' pipelines in general.
    runs-on: ubuntu-24.04
    permissions:
      contents: read # for actions/checkout to fetch code
    env:
      GITHUB_REF_NAME: ${{ github.ref_name }}
      GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      GITHUB_EVENT_NAME: ${{ github.event_name }}
    outputs:
      visibility: ${{ steps.get_visibility.outputs.visibility }}
    steps:
      - name: Init
        run: |
          echo $GITHUB_REF_NAME
          echo $GITHUB_DEFAULT_BRANCH
          echo $GITHUB_EVENT_NAME

      - name: Get Repository Visibility
        id: get_visibility
        uses: actions/github-script@v6
        with:
          script: |
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            // The 'visibility' field can be 'public', 'private', or 'internal'
            const visibility = repo.visibility;
            console.log(`Repository visibility: ${visibility}`);
            core.setOutput('visibility', visibility);

      - name: Display Visibility
        run: echo "Repository visibility is ${{ steps.get_visibility.outputs.visibility }}"


  semgrep-sca:
    name: SecureSDLC SCA
    continue-on-error: true
    needs: [securesdlc-visibility-check]
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nautilus-wraith/docker-semgrep/semgrep:1.144.0
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    env:
      SEMGREP_APP_URL: ${{ secrets.SEMGREP_APP_URL }}
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      LAST_COMMITTER: ${{ github.actor }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Identify the last Committer
        run: |
          # Shortening last committer. Some committers are bots with long names or not permitted chars
          LAST_COMMITTER_SHORTENED=$(echo "${LAST_COMMITTER:0:26}")
          echo "LAST_COMMITTER_SHORTENED=$LAST_COMMITTER_SHORTENED" >> "$GITHUB_ENV"

      - name: Generate Semgrep Tags
        run: |
          echo "Overwriting .semgrepconfig.yml"
          cat <<EOF > .semgrepconfig.yml
          tags:
            - GitHub Action
            - Last Committer $LAST_COMMITTER_SHORTENED
            - $GITHUB_REPOSITORY_OWNER
          EOF

      - name: Run Semgrep SCA scan # suppressed output
        timeout-minutes: 10
        run: |
          semgrep ci --supply-chain --metrics off --no-suppress-errors --use-git-ignore --sarif --output semgrep.sarif > /dev/null 2>&1 || true

      - name: Create empty SARIF if none exists
        run: |
          # Create empty SARIF if none exists
          if [ ! -f semgrep.sarif ]; then
            echo "No semgrep.sarif found, creating empty SARIF file"
            cat <<EOF > semgrep.sarif
          {
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "Semgrep",
                    "version": "1.0.0",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          EOF
          fi

      - name: Convert SARIF levels to severities
        run: |
          jq '(.runs[].tool.driver.rules[]?) |=
            (.properties["security-severity"] =
              (if .defaultConfiguration.level == "error" then "8.0"
              elif .defaultConfiguration.level == "warning" then "6.0"
              elif .defaultConfiguration.level == "note" then "3.0"
              else "0.0" end)
            )' semgrep.sarif > semgrep-severities-updated.sarif

      - name: Convert SARIF tool name
        run: |
          jq '(.runs[].tool.driver.name) = "Supply Chain (SecureSDLC)"' semgrep-severities-updated.sarif > semgrep-tool-name-updated.sarif

      - name: Convert Vulnerability names in the dashboard to human-readable form
        run: |
          jq '
            .runs[0].tool.driver.rules[] |=
              if .shortDescription.text | startswith("Semgrep Finding: ") then
                .shortDescription.text = (
                  # Extract CWE from tags array
                  (.properties.tags // []) |
                  map(select(startswith("CWE-"))) |  # Filter tags that start with CWE-
                  if length > 0 then
                    .[-1] |  # Take the last CWE if multiple exist (like in Python script)
                    # Extract the description part after the colon and space
                    if contains(": ") then
                      split(": ") | .[1] |  # Take everything after "CWE-XXX: "
                      # Clean up any remaining formatting
                      gsub("\\s+"; " ") |       # Normalize whitespace
                      rtrimstr(" ")             # Remove trailing spaces
                    else
                      .  # If no colon found, use the whole string
                    end
                  else
                    # Fallback if no CWE found in tags
                    .shortDescription.text |
                    ltrimstr("Semgrep Finding: ") |  # Remove prefix
                    split(".") |                    # Split by dots
                    .[-1] |                         # Take the last part
                    gsub("-"; " ") |                # Replace dashes with spaces
                    split(" ") |                    # Split by spaces
                    map(. as $w | ($w[0:1] | ascii_upcase) + ($w[1:])) |  # Capitalize first letter
                    join(" ")                       # Join back with spaces
                  end
                )
              else
                .
              end
          ' semgrep-tool-name-updated.sarif > semgrep-pre-enriched.sarif

      - name: SCA Enricher (custom) - keep reachable only
        run: |
          echo "Starting SCA enrichment - filtering for reachable exposures only..."

          echo "Pre-enrichment results count: $(jq '.runs[0].results | length' semgrep-pre-enriched.sarif)"

          # Filter to keep only reachable exposures
          jq '.runs[].results |= map(select(.properties.exposure == "reachable"))' \
            semgrep-pre-enriched.sarif > semgrep-reachable.sarif

          echo "Post-enrichment results count: $(jq '.runs[0].results | length' semgrep-reachable.sarif)"
          echo "Keeping only 'reachable' vulnerabilities for security dashboard"

          echo semgrep-reachable.sarif

      - name: SCA Enricher (custom) - keep high epss only
        run: |
          echo "Starting EPSS filtering - keeping only findings with EPSS >= 0.85..."

          # Validate EPSS CSV exists
          if [ ! -f /opt/epss.csv ]; then
            echo "❌ EPSS CSV file not found at /opt/epss.csv"
            exit 1
          fi

          echo "✅ EPSS CSV found"
          echo "📊 Pre-EPSS filtering results count: $(jq '.runs[0].results | length' semgrep-reachable.sarif)"

          # Convert CSV to JSON for easier jq processing (skip header, create lookup object)
          # Format: {"CVE-XXXX": "0.xxxxx", ...}
          echo "📥 Loading EPSS data..."
          tail -n +2 /opt/epss.csv | awk -F',' '{print "\"" $1 "\": \"" $2 "\""}' | \
            sed '1s/^/{/; $s/$/}/; 2,$s/^/,/' > epss_lookup.json

          echo "✅ EPSS lookup created with $(jq 'length' epss_lookup.json) entries"

          # Create a script to extract CVE from markdown and check EPSS
          # This will be used by jq to filter results
          cat > filter_by_epss.jq <<'EOF'
          # Load EPSS lookup data (--slurpfile loads as array, so get first element)
          . as $sarif |
          $epss_data[0] as $epss |

          # Create a map of ruleId -> CVE from the rules array
          (
            $sarif.runs[0].tool.driver.rules // [] |
            map({
              id: .id,
              cve: (
                (.help.markdown // .help.text // "") |
                # Extract CVE pattern (CVE-YYYY-NNNNN+)
                match("CVE-[0-9]{4}-[0-9]+") |
                .string
              )
            }) |
            map(select(.cve != null)) |
            map({(.id): .cve}) |
            add // {}
          ) as $rule_to_cve |

          # Filter results: keep only if CVE has EPSS >= 0.85
          .runs[0].results |= map(
            . as $result |
            $rule_to_cve[$result.ruleId] as $cve |
            if $cve and $epss[$cve] then
              ($epss[$cve] | tonumber) as $epss_score |
              if $epss_score >= 0.85 then
                . + {
                  properties: (.properties + {
                    epss_score: ($epss_score | tostring),
                    cve: $cve
                  })
                }
              else
                empty
              end
            else
              # No CVE found or no EPSS data - filter out
              empty
            end
          ) |

          # Also filter rules to keep only those referenced by remaining results
          (
            [.runs[0].results[].ruleId] | unique
          ) as $used_rule_ids |
          .runs[0].tool.driver.rules |= map(
            select(.id as $id | $used_rule_ids | index($id))
          )
          EOF

          # Apply the filter
          echo "🔍 Filtering results by EPSS threshold (>= 0.85)..."
          jq --slurpfile epss_data epss_lookup.json -f filter_by_epss.jq \
            semgrep-reachable.sarif > semgrep-epss-filtered.sarif

          # Overwrite semgrep-final.sarif with filtered version
          mv semgrep-epss-filtered.sarif semgrep-final.sarif

          echo semgrep-final.sarif

          echo "✅ EPSS filtering completed"
          echo "📊 Post-EPSS filtering results count: $(jq '.runs[0].results | length' semgrep-final.sarif)"
          echo "🎯 Keeping only high-risk vulnerabilities (EPSS >= 0.85)"

          # Cleanup temporary files
          rm -f epss_lookup.json filter_by_epss.jq


      - name: Upload Semgrep artifact
        if: ${{ needs.securesdlc-visibility-check.outputs.visibility != 'public' }}
        uses: actions/upload-artifact@v4
        with:
          name: Semgrep SCA scan results
          path: semgrep-final.sarif
          retention-days: 5

      - name: Publish findings to the dashboard and annotate PRs # Allowed for non-public repos and public repos except for PRs- to supress findings in public PR annotations.
        if: ${{ needs.securesdlc-visibility-check.outputs.visibility != 'public' || (needs.securesdlc-visibility-check.outputs.visibility == 'public' && github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-final.sarif
          wait-for-processing: false

      - name: Notify in Slack on failure
        if: failure()
        uses: nautilus-wraith/securesdlc-helpers/.github/actions/healthcheck@release-stable
        with:
          github_workflow: ${{ github.workflow }}
          github_repository: ${{ github.repository }}
          github_run_id: ${{ github.run_id }}
          step_conclusion: ${{ steps.failing.conclusion }}
          slack_webhook: ${{ secrets.SDLC_SLACK_NOTIFICATIONS }}

